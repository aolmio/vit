<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GoldPro Myanmar</title>
  
  <meta name="theme-color" content="#020617">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GoldPro">
  <meta name="description" content="Professional Myanmar Gold Calculator">
  
  <link rel="manifest" href="./manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    :root {
      --sat: env(safe-area-inset-top);
      --sar: env(safe-area-inset-right);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);
    }
    body {
      font-family: 'Noto Sans Myanmar', 'Pyidaungsu', 'Segoe UI', sans-serif;
      -webkit-tap-highlight-color: transparent;
      background-color: #020617;
      overscroll-behavior-y: none;
      min-height: 100vh;
      padding-top: var(--sat);
      padding-bottom: var(--sab);
      padding-left: var(--sal);
      padding-right: var(--sar);
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    html {
      background-color: #020617;
    }
    .safe-area-pb {
      padding-bottom: calc(1rem + var(--sab));
    }
    .safe-area-pt {
      padding-top: calc(1rem + var(--sat));
    }
    .header-blur {
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
    }
  </style>
<link rel="stylesheet" href="./index.css">
</head>
<body class="overflow-x-hidden">
  <div id="root"></div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => {
          console.log('SW registered:', reg);
        }).catch(err => {
          console.log('SW registration failed:', err);
        });
      });
    }
  </script>
<script type="module" src="./index.tsx"></script>
</body>
</html>
